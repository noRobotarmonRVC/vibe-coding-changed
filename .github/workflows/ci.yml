name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ clang-tidy gcovr

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-${{ hashFiles('src/CMakeLists.txt') }}
          restore-keys: fetchcontent-

      - name: Configure (with coverage)
        run: cmake -S src -B build -DENABLE_COVERAGE=ON -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        # [변경] CI builds the active CMake graph after RightSensor removal.
        run: cmake --build build --parallel

      - name: Run tests
        # [추가] Right Scan and tick ESCAPING behavior are covered by rvc_tests.
        run: cd build && ctest --output-on-failure

      - name: Static analysis
        run: |
          find src test -name '*.cpp' \
            | xargs clang-tidy -p build --warnings-as-errors='*'

      - name: Coverage report
        run: |
          mkdir -p coverage
          gcovr -r . build \
            --filter 'src/' \
            --exclude 'build/_deps/.*' \
            --html --html-details \
            -o coverage/index.html \
            --print-summary

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
